_target_: autorag_research.pipelines.generation.deep_rag.DeepRAGPipelineConfig
description: "DeepRAG subquery-level MDP generation pipeline"
name: deep_rag
retrieval_pipeline_name: bm25
llm: mock
max_steps: 5
# Per DeepRAG retrieve decision, request up to this many chunks.
# The inherited top_k below remains the global runner cap when it is > 0.
k_per_retrieval: 5
evidence_budget: 12
# Repo adaptation: if an untrained controller never emits <answer>, answer from the recorded trajectory.
fallback_to_final_prompt: true
top_k: 5
batch_size: 32
max_concurrency: 4
max_retries: 3
retry_delay: 1.0
