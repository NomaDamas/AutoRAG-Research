_target_: autorag_research.pipelines.generation.ras.RASGenerationPipelineConfig
description: "RAS plan-first retrieval-and-structuring generation pipeline with an evolving question graph"
name: ras
retrieval_pipeline_name: bm25
llm: openai-gpt5-mini
max_steps: 3
k_per_step: 4
evidence_budget: 12
triple_budget: 40
# RAS plans before any retrieval. The planner emits [NO_RETRIEVAL], [SUBQ] <query>,
# or [SUFFICIENT]; retrieval occurs only for planned [SUBQ] actions.
top_k: 4
batch_size: 32
max_concurrency: 4
max_retries: 3
retry_delay: 1.0
