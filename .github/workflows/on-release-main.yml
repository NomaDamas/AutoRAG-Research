name: release-main

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out release
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.9.7"
          enable-cache: false

      - name: Set release version
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: uv version --frozen -- "$RELEASE_VERSION"

      - name: Build package
        run: uv build --no-sources

      - name: Upload package distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: dist
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/autorag-research
    permissions:
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          attestations: true

  deploy-docs:
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out release
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }} # zizmor: ignore[artipacked] -- mkdocs gh-deploy requires checkout credentials

      - name: Install uv and Python
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.9.7"
          python-version: "3.12"
          enable-cache: false

      - name: Install documentation dependencies
        run: uv sync --frozen --all-extras

      - name: Deploy documentation
        run: uv run mkdocs gh-deploy --force
